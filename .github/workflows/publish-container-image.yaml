name: Publish container image

on:
  # For every push to a branch other than the default branch
  push:
    branches-ignore:
      - main
  # Every Sunday at 03:49 UTC
  schedule:
    - cron: '49 2 * * 0'
  # Manual trigger
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  push-to-registry:
    runs-on: ubuntu-latest
    
    name: Push container image to ghcr.io

    permissions:
      contents: read
      packages: write

    steps:
      - name: Clone repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.PACKAGES_WRITE_TOKEN }}

      - name: Derive base image tag and build date
        id: vars
        run: |
          # Extract tag from base image
          base_tag="$(awk '/^FROM[[:space:]]+postgres:/ { sub(/^postgres:/, "", $2); print $2; exit }' Dockerfile)"
          if [ -z "$base_tag" ]; then
            echo "Could not derive base tag from Dockerfile" >&2
            exit 1
          fi
          echo "base_tag=${base_tag}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y.%m.%d)" >> "$GITHUB_OUTPUT"

      - name: Specify tags and labels
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,enable=${{ github.event_name == 'push' }}
            type=raw,value=${{ steps.vars.outputs.base_tag }},enable=${{ github.event_name != 'push' }}
            type=raw,value=${{ steps.vars.outputs.base_tag }}.${{ steps.vars.outputs.date }},enable=${{ github.event_name != 'push' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
